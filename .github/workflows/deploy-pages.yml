# Publica la carpeta frontend/ como raíz del sitio (evita README y rutas /docs rotas).
# En el repo: Settings → Pages → Build: GitHub Actions (no "Deploy from branch" con /docs vacío).
name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Escribir rentals-config.js (evita 404 y conecta Supabase en Pages)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ADMIN_WHATSAPP_DIGITS: ${{ secrets.ADMIN_WHATSAPP_DIGITS }}
          ADMIN_SYNC_SECRET: ${{ secrets.ADMIN_SYNC_SECRET }}
          AIRBNB_URL: ${{ secrets.AIRBNB_URL }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const cfgPath = "frontend/rentals-config.js";
          const supaUrl = (process.env.SUPABASE_URL || "").trim();
          const supaAnon = (process.env.SUPABASE_ANON_KEY || "").trim();

          // Si no hay secrets, NO sobrescribir el config del repo.
          if (!supaUrl || !supaAnon) {
            console.log("[deploy-pages] SUPABASE_URL/ANON_KEY vacíos: manteniendo frontend/rentals-config.js del repo");
            process.exit(0);
          }

          let repoAirbnb = "";
          try {
            const old = fs.readFileSync(cfgPath, "utf8");
            const m = old.match(/airbnbUrl:\s*"([^"]*)"/);
            if (m && m[1]) repoAirbnb = m[1].trim();
          } catch (_e) {}

          const secretAirbnb = (process.env.AIRBNB_URL || "").trim();
          const airbnbUrl = secretAirbnb || repoAirbnb;

          const wa = (process.env.ADMIN_WHATSAPP_DIGITS || "573026691995").replace(/\D/g, "") || "573026691995";
          const cfg = {
            supabaseUrl: supaUrl,
            supabaseAnonKey: supaAnon,
            adminWhatsappDigits: wa,
            adminSyncSecret: (process.env.ADMIN_SYNC_SECRET || "").trim(),
            airbnbUrl,
          };
          const hdr =
            "/** Generado en GitHub Actions desde Repository secrets (no commitear claves en el repo). */\n";
          fs.writeFileSync(cfgPath, hdr + "window.RENTALS_CONFIG = " + JSON.stringify(cfg, null, 2) + ";\n");
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload static site (frontend como raíz)
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
